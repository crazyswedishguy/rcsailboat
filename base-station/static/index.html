<script type="text/babel">
const { useState, useRef, useEffect, useMemo } = React;

// ── GPS helpers ───────────────────────────────────────────────────────────────
// Flat-earth approximation is accurate to < 0.1 % at the distances a sailboat
// covers, so the full Haversine formula is used for correctness.

function haversineM(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const f1 = lat1*Math.PI/180, f2 = lat2*Math.PI/180;
  const df = (lat2-lat1)*Math.PI/180, dl = (lon2-lon1)*Math.PI/180;
  const a  = Math.sin(df/2)**2 + Math.cos(f1)*Math.cos(f2)*Math.sin(dl/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function bearingDeg(lat1, lon1, lat2, lon2) {
  const f1 = lat1*Math.PI/180, f2 = lat2*Math.PI/180;
  const dl = (lon2-lon1)*Math.PI/180;
  const y  = Math.sin(dl)*Math.cos(f2);
  const x  = Math.cos(f1)*Math.sin(f2) - Math.sin(f1)*Math.cos(f2)*Math.cos(dl);
  return ((Math.atan2(y,x)*180/Math.PI) + 360) % 360;
}

// ── App-shell components ──────────────────────────────────────────────────────

// StatusBar: topmost row — clock, orientation toggle, theme toggle, signal icons.
// In production the clock would be device time (or omitted); here we show
// a static "live" indicator and the two toggles.
function StatusBar({ T, theme, setTheme, orient, setOrient, onSettings }) {
  return (
    <div style={{ height:30, display:'flex', alignItems:'center',
      justifyContent:'space-between', padding:'0 22px',
      background:T.surface, borderBottom:`1px solid ${T.border}`, flexShrink:0 }}>
      <span style={{ fontFamily:_MONO, fontWeight:700, fontSize:13, color:T.text }}>
        {new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
      </span>
      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
        <div onClick={() => setOrient(o => o==='portrait'?'landscape':'portrait')}
          style={{ fontFamily:_MONO, fontSize:9, fontWeight:700, letterSpacing:'0.08em',
            color:T.faint, padding:'3px 8px', borderRadius:6, background:T.inset,
            cursor:'pointer' }}>
          {orient==='portrait' ? '⇄ LANDSCAPE' : '⇅ PORTRAIT'}
        </div>
        <div onClick={() => setTheme(t => t==='day'?'dusk':'day')}
          style={{ fontFamily:_MONO, fontSize:9, fontWeight:700, letterSpacing:'0.08em',
            color:T.faint, padding:'3px 8px', borderRadius:6, background:T.inset,
            cursor:'pointer' }}>
          {theme==='day' ? '☀ DAY' : '☾ DUSK'}
        </div>
        {/* Settings gear — opens the token / device-label modal */}
        <div onClick={onSettings}
          style={{ fontFamily:_MONO, fontSize:12, color:T.faint,
            padding:'2px 6px', borderRadius:6, background:T.inset, cursor:'pointer' }}>⚙</div>
      </div>
    </div>
  );
}

// Masthead: logo + wordmark + Pi·ELRS label + LINKED/NO LINK badge.
function Masthead({ T, linked }) {
  return (
    <div style={{ display:'flex', alignItems:'stretch',
      background:T.surface, borderBottom:`2px solid ${T.accent}`, flexShrink:0 }}>
      <div style={{ display:'flex', alignItems:'center', gap:10, padding:'8px 16px', flex:1 }}>
        <Logo T={T} height={26}/>
        <span style={{ fontSize:18, fontWeight:700, letterSpacing:'-0.01em', color:T.accent }}>
          Mistral
        </span>
        <span style={{ fontFamily:_MONO, fontSize:9, fontWeight:600,
          letterSpacing:'0.12em', color:T.faint, textTransform:'uppercase' }}>
          Pi · ELRS
        </span>
      </div>
      {/* Linked badge — green when ELRS bridge is connected, red otherwise */}
      <div style={{ display:'flex', alignItems:'center', gap:7, padding:'0 16px',
        background:linked?T.safeSoft:T.dangerSoft, borderLeft:`1px solid ${T.border}` }}>
        <span style={{ width:7, height:7, borderRadius:99,
          background:linked?T.safe:T.danger,
          boxShadow:`0 0 0 3px ${linked?T.safeSoft:T.dangerSoft}` }}/>
        <span style={{ fontFamily:_MONO, fontSize:10, fontWeight:700, letterSpacing:'0.09em',
          color:linked?T.safe:T.danger }}>
          {linked ? 'LINKED' : 'NO LINK'}
        </span>
      </div>
    </div>
  );
}

// TabBar: five tabs across the full width.
const TABS = [
  {id:'control', label:'Control'},
  {id:'instr',   label:'Instr'},
  {id:'map',     label:'Map'},
  {id:'devices', label:'Devices'},
  {id:'console', label:'Console'},
];

function TabBar({ T, tab, setTab }) {
  return (
    <div style={{ display:'flex', background:T.surface,
      borderBottom:`1px solid ${T.border}`, flexShrink:0 }}>
      {TABS.map(({id,label}) => {
        const on = id===tab;
        return (
          <div key={id} onClick={() => setTab(id)} style={{ flex:1, textAlign:'center',
            padding:'9px 4px', fontFamily:_MONO, fontSize:10, fontWeight:700,
            letterSpacing:'0.05em', color:on?T.accent:T.faint, cursor:'pointer',
            borderBottom:`2.5px solid ${on?T.accent:'transparent'}`,
            overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
            {label}
          </div>
        );
      })}
    </div>
  );
}

// HelmBanner: the full-width banner below the tab bar on the Control tab.
// Four states:
//   observer (no controller)   → navy "TAP TO TAKE HELM"
//   observer (someone helming) → dim  "TAP TO REQUEST HELM FROM <name>"
//   requesting                 → amber "REQUESTING HELM… Xs"
//   controller                 → navy filled "HELM ACTIVE"
// When the controller has a pending request, an extra notification bar appears.
function HelmBanner({ T, controlRole, controllerLabel, pendingLabel, pendingExpiresIn,
                      onRequest, onAccept, onDismiss }) {
  const inControl  = controlRole === 'controller';
  const requesting = controlRole === 'requesting';

  return (
    <>
      {/* ── Main banner ───────────────────────────────────────────────────── */}
      <div onClick={inControl ? undefined : onRequest}
        style={{ display:'flex', alignItems:'center', gap:10, padding:'9px 16px',
          flexShrink:0, cursor:inControl?'default':'pointer',
          background:inControl ? T.accent : requesting ? T.warnSoft : T.inset,
          borderBottom:`1px solid ${inControl?T.accent:requesting?T.warn:T.border}` }}>
        {/* Bell icon — white on active, dim otherwise */}
        <svg width="13" height="13" viewBox="0 0 24 24"
          fill={inControl?'#fff':requesting?T.warn:T.dim}>
          <path d="M12 2a3 3 0 0 1 3 3v1.6a6 6 0 0 1 3 5.2V18l2 2v1H4v-1l2-2v-5.2a6 6 0 0 1 3-5.2V5a3 3 0 0 1 3-3z"/>
        </svg>
        <span style={{ fontFamily:_MONO, fontSize:11.5, fontWeight:700,
          letterSpacing:'0.09em',
          color:inControl?'#fff':requesting?T.warn:T.dim }}>
          {inControl   ? 'HELM ACTIVE'
           : requesting ? `REQUESTING HELM…${pendingExpiresIn!=null?` ${pendingExpiresIn}s`:''}`
           : controllerLabel ? `TAP TO REQUEST HELM FROM ${controllerLabel.toUpperCase()}`
           : 'TAP TO TAKE HELM'}
        </span>
        <span style={{ flex:1 }}/>
        {inControl && (
          <span style={{ fontFamily:_MONO, fontSize:9,
            color:'rgba(255,255,255,0.70)', letterSpacing:'0.04em' }}>
            STOP CUTS POWER
          </span>
        )}
      </div>

      {/* ── Incoming request notification (shown to the controller) ──────── */}
      {inControl && pendingLabel && (
        <div style={{ display:'flex', alignItems:'center', gap:8,
          padding:'7px 16px', flexShrink:0,
          background:T.accentSoft, borderBottom:`1px solid ${T.accentLine}` }}>
          <span style={{ fontFamily:_MONO, fontSize:10, fontWeight:700,
            color:T.accent, flex:1 }}>
            {pendingLabel} wants the helm
            {pendingExpiresIn!=null && (
              <span style={{ color:T.dim }}> · {pendingExpiresIn}s left</span>
            )}
          </span>
          <div onClick={onAccept} style={{ padding:'4px 12px', borderRadius:7,
            background:T.safeSoft, border:`1px solid ${T.safe}`,
            fontFamily:_MONO, fontSize:10, fontWeight:700,
            color:T.safe, cursor:'pointer' }}>
            Hand off
          </div>
          <div onClick={onDismiss} style={{ padding:'4px 12px', borderRadius:7,
            background:T.inset, border:`1px solid ${T.border}`,
            fontFamily:_MONO, fontSize:10, fontWeight:700,
            color:T.dim, cursor:'pointer' }}>
            Dismiss
          </div>
        </div>
      )}
    </>
  );
}

// TelemetryBar: compact 5-column strip shown on non-Control tabs.
function TelemetryBar({ T, d, stale }) {
  const items = [
    ['BATT',  stale.telem, `${d.volts.toFixed(1)}V`],
    ['CHG',   stale.telem, `${d.chg}%`],
    ['LQ',    stale.link,  `${d.lq}%`],
    ['SATS',  stale.gps,   `${d.sats}`],
    ['SPD',   stale.gps,   `${d.spd.toFixed(1)} kn`],
  ];
  return (
    <div style={{ display:'grid', gridTemplateColumns:'repeat(5,1fr)',
      background:T.surface, borderBottom:`1px solid ${T.border}`, flexShrink:0 }}>
      {items.map(([k,isStale,v], i) => (
        <div key={k} style={{ padding:'9px 6px', display:'flex',
          flexDirection:'column', alignItems:'center', gap:3,
          borderLeft:i?`1px solid ${T.border}`:'none' }}>
          <span style={{ fontFamily:_MONO, fontSize:7.5, fontWeight:600,
            letterSpacing:'0.10em', textTransform:'uppercase', color:T.faint }}>
            {k}
          </span>
          <span style={{ fontFamily:_MONO, fontWeight:700, fontSize:11.5,
            color:isStale?T.faint:T.text, fontFeatureSettings:'"tnum","zero"' }}>
            {v}
          </span>
        </div>
      ))}
    </div>
  );
}

// SettingsModal: overlay for device label and access token.
// Token changes take effect on the next WebSocket reconnect.
function SettingsModal({ T, tweaks, setTweak, onClose, onReconnect }) {
  const inp = { width:'100%', padding:'6px 10px', borderRadius:7,
    border:`1px solid ${T.border}`, background:T.inset,
    color:T.text, fontFamily:_MONO, fontSize:12, outline:'none' };
  return (
    <div style={{ position:'fixed', inset:0, zIndex:999,
      background:'rgba(0,0,0,0.55)', display:'flex',
      alignItems:'flex-end', justifyContent:'center' }}
      onClick={onClose}>
      <div onClick={e=>e.stopPropagation()}
        style={{ width:'100%', maxWidth:430, background:T.surface,
          borderRadius:'18px 18px 0 0', padding:'20px 20px 32px',
          border:`1px solid ${T.border}` }}>
        <div style={{ fontFamily:_MONO, fontSize:11, fontWeight:700,
          letterSpacing:'0.10em', textTransform:'uppercase',
          color:T.accent, marginBottom:16 }}>Settings</div>
        {/* Device label — shown to other clients when requesting the helm */}
        <div style={{ marginBottom:14 }}>
          <div style={{ fontFamily:_MONO, fontSize:9, fontWeight:600,
            letterSpacing:'0.10em', textTransform:'uppercase',
            color:T.dim, marginBottom:5 }}>Device label</div>
          <input style={inp} value={tweaks.label||''}
            placeholder="My phone"
            onChange={e => setTweak('label', e.target.value)}/>
          <div style={{ fontFamily:_MONO, fontSize:9, color:T.faint, marginTop:3 }}>
            Shown to other controllers during handoff
          </div>
        </div>
        {/* Access token — must match RCSB_TOKEN on the Pi */}
        <div style={{ marginBottom:20 }}>
          <div style={{ fontFamily:_MONO, fontSize:9, fontWeight:600,
            letterSpacing:'0.10em', textTransform:'uppercase',
            color:T.dim, marginBottom:5 }}>Access token</div>
          <input type="password" style={inp} value={tweaks.token||''}
            placeholder="changeme"
            onChange={e => setTweak('token', e.target.value)}/>
          <div style={{ fontFamily:_MONO, fontSize:9, color:T.faint, marginTop:3 }}>
            Must match RCSB_TOKEN in /etc/rcsailboat.env
          </div>
        </div>
        <div style={{ display:'flex', gap:10 }}>
          <div onClick={() => { onReconnect(); onClose(); }}
            style={{ flex:1, padding:'12px', borderRadius:10, textAlign:'center',
              background:T.accentSoft, border:`1.5px solid ${T.accent}`,
              fontFamily:_MONO, fontSize:12, fontWeight:700,
              color:T.accent, cursor:'pointer' }}>
            Reconnect
          </div>
          <div onClick={onClose}
            style={{ flex:1, padding:'12px', borderRadius:10, textAlign:'center',
              background:T.inset, border:`1px solid ${T.border}`,
              fontFamily:_MONO, fontSize:12, fontWeight:700,
              color:T.dim, cursor:'pointer' }}>
            Close
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  // ── Persistent settings (token + device label) ─────────────────────────────
  // Stored in localStorage so they survive page reloads.
  const [tweaks, _setTweaks] = useState(() => {
    try { return JSON.parse(localStorage.getItem('rcsb-tweaks')||'{}'); }
    catch { return {}; }
  });
  function setTweak(k, v) {
    _setTweaks(prev => {
      const next = { ...prev, [k]:v };
      localStorage.setItem('rcsb-tweaks', JSON.stringify(next));
      return next;
    });
  }
  const [settingsOpen, setSettingsOpen] = useState(false);

  // ── Layout state ───────────────────────────────────────────────────────────
  const [theme,  setTheme]  = useState('day');
  const [orient, setOrient] = useState('portrait');
  const [tab,    setTab]    = useState('control');
  const T = THEMES[theme];

  // Auto-switch orientation when the device rotates
  useEffect(() => {
    const mq = window.matchMedia('(orientation: landscape)');
    const handle = e => setOrient(e.matches ? 'landscape' : 'portrait');
    mq.addEventListener('change', handle);
    return () => mq.removeEventListener('change', handle);
  }, []);

  // ── Control inputs (local state — optimistic updates before WS confirms) ───
  const [sail,         setSail]         = useState(0.2);
  const [rudder,       setRudder]       = useState(0);
  const [rudderTrim,   setRudderTrim]   = useState(0);
  const [throttle,     setThrottle]     = useState(0);
  const [motorMode,    setMotorMode]    = useState('off');

  // ── Telemetry state (populated from incoming WS messages) ─────────────────
  const [telem, setTelem] = useState({
    bridge:false,
    volts:0, amps:0, pct:0, mah:0,
    sats:0, speed:0, lat:0, lng:0, alt:0, hdg:0,
    roll:0, pitch:0,
    lq:0, rssi:0,
    temp:0, bilge:false,
  });
  const [deviceStatus, setDeviceStatus] = useState({});

  // ── Staleness tracking ─────────────────────────────────────────────────────
  // We record the browser wall-clock time when each data group last arrived.
  // A 1-second ticker (nowMs) drives the staleness check in the render path.
  const [lastTelemMs, setLastTelemMs] = useState(0);
  const [lastGpsMs,   setLastGpsMs]   = useState(0);
  const [nowMs,       setNowMs]       = useState(Date.now());

  useEffect(() => {
    const id = setInterval(() => setNowMs(Date.now()), 1000);
    return () => clearInterval(id);
  }, []);

  const stale = {
    // Boat telemetry is stale after 3 s without a CRSF frame
    telem: !telem.bridge || lastTelemMs===0 || (nowMs-lastTelemMs > 3000),
    // GPS updates at 1 Hz; stale after 8 s (allows a few missed frames)
    gps:   !telem.bridge || lastGpsMs===0   || (nowMs-lastGpsMs   > 8000),
    // Link statistics come with the same CRSF frame as other telemetry
    link:  !telem.bridge || lastTelemMs===0 || (nowMs-lastTelemMs > 3000),
  };

  // ── GPS home position ──────────────────────────────────────────────────────
  // Set automatically on first fix; user can override via "SET HOME HERE".
  const [homePos, setHomePos] = useState(null);
  const homePosSetRef = useRef(false); // prevent re-setting on every render

  // ── Console (ESP32 USB serial) ─────────────────────────────────────────────
  const [consoleLines,   setConsoleLines]   = useState([]);
  const [consoleEnabled, setConsoleEnabled] = useState(false);

  // ── Controller / observer state ────────────────────────────────────────────
  // mySessionRef holds the short session ID assigned by the server on connect.
  // It's a ref (not state) because it only needs to be read inside callbacks,
  // not trigger re-renders.
  const mySessionRef   = useRef(null);
  const [controlRole,      setControlRole]      = useState('observer');
  const [controllerLabel,  setControllerLabel]  = useState(null);
  const [pendingLabel,     setPendingLabel]      = useState(null);
  const [pendingExpiresIn, setPendingExpiresIn]  = useState(null);
  const pendingTimerRef = useRef(null); // setInterval handle for countdown

  // ── WebSocket ──────────────────────────────────────────────────────────────
  const wsRef = useRef(null);

  // Read fresh settings from localStorage at connect time so a token change
  // (from the settings modal) takes effect on the next reconnect without
  // needing to re-render the component.
  function getStoredTweak(key) {
    try { return JSON.parse(localStorage.getItem('rcsb-tweaks')||'{}')[key]||''; }
    catch { return ''; }
  }

  function connect() {
    const token = getStoredTweak('token') || 'changeme';
    const url   = `ws://${location.host}/ws?token=${encodeURIComponent(token)}`;
    const ws    = new WebSocket(url);
    wsRef.current = ws;

    ws.onmessage = (evt) => {
      let msg;
      try { msg = JSON.parse(evt.data); } catch { return; }

      // ── Session assigned by server ─────────────────────────────────────
      if (msg.type === 'session') {
        mySessionRef.current = msg.id;
        return;
      }

      // ── Controller / observer state update ─────────────────────────────
      if (msg.type === 'control_state') {
        const sid = mySessionRef.current;
        const role = sid && msg.controller_session===sid ? 'controller'
                   : sid && msg.pending_session===sid    ? 'requesting'
                   : 'observer';
        setControlRole(role);
        setControllerLabel(msg.controller_label);
        setPendingLabel(msg.pending_label);

        // Start or clear the client-side countdown timer.
        // The server sends expires_in at state-change events; we count down
        // locally between events for smooth display.
        if (pendingTimerRef.current) {
          clearInterval(pendingTimerRef.current);
          pendingTimerRef.current = null;
        }
        if (msg.pending_expires_in > 0) {
          const startAt = Date.now(), initial = msg.pending_expires_in;
          setPendingExpiresIn(Math.ceil(initial));
          pendingTimerRef.current = setInterval(() => {
            const rem = initial - (Date.now()-startAt)/1000;
            if (rem <= 0) {
              clearInterval(pendingTimerRef.current);
              pendingTimerRef.current = null;
              setPendingExpiresIn(0);
            } else {
              setPendingExpiresIn(Math.ceil(rem));
            }
          }, 250);
        } else {
          setPendingExpiresIn(null);
        }
        return;
      }

      // ── ESP32 USB serial line ──────────────────────────────────────────
      if (msg.type === 'console') {
        setConsoleLines(prev => {
          const next = [...prev, msg.line];
          return next.length > 500 ? next.slice(-500) : next; // ring buffer
        });
        return;
      }

      // ── Telemetry frame ────────────────────────────────────────────────
      if (msg.type !== 'telemetry') return;

      const now = Date.now();
      // Only update freshness timestamps when data was actually received
      // (updated_at > 0 means the Pi has seen at least one CRSF frame of that type)
      if (msg.updated_at?.telem > 0) setLastTelemMs(now);
      if (msg.updated_at?.gps   > 0) setLastGpsMs(now);

      setConsoleEnabled(msg.console?.enabled ?? false);

      const ds = msg.device_status || {};
      setDeviceStatus(ds);

      setTelem({
        bridge: msg.bridge ?? false,
        volts:  msg.battery?.voltage_v   ?? 0,
        amps:   msg.battery?.current_a   ?? 0,
        pct:    msg.battery?.battery_pct ?? 0,
        mah:    msg.battery?.mah_used    ?? 0,
        sats:   msg.gps?.satellites      ?? 0,
        speed:  msg.gps?.speed_kmh       ?? 0, // km/h; converted to kn in d
        lat:    msg.gps?.lat             ?? 0,
        lng:    msg.gps?.lng             ?? 0,
        alt:    msg.gps?.altitude_m      ?? 0,
        hdg:    msg.attitude?.yaw_deg    ?? 0,
        roll:   msg.attitude?.roll_deg   ?? 0,
        pitch:  msg.attitude?.pitch_deg  ?? 0,
        lq:     msg.link?.lq_uplink      ?? 0,
        rssi:   msg.link?.rssi_uplink    ?? 0,
        temp:   msg.sailboat?.mcu_temp_c ?? 0,
        bilge:  ds.bilge === 'warn',
      });
    };

    ws.onclose = () => {
      wsRef.current = null;
      setTelem(prev => ({ ...prev, bridge:false }));
      setTimeout(connect, 2000); // reconnect after 2 s
    };
  }

  useEffect(() => {
    connect();
    return () => { wsRef.current?.close(); wsRef.current = null; };
  }, []);

  // Auto-set home position on first valid GPS fix
  useEffect(() => {
    if (!homePosSetRef.current && telem.sats >= 3 && telem.lat !== 0) {
      setHomePos({ lat:telem.lat, lng:telem.lng });
      homePosSetRef.current = true;
    }
  }, [telem.sats, telem.lat, telem.lng]);

  // ── Send control commands when role or axis values change ─────────────────
  // Only the active controller sends servo commands.
  useEffect(() => {
    if (controlRole !== 'controller') return;
    const ws = wsRef.current;
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type:'control', rudder, sail, throttle }));
  }, [rudder, sail, throttle, controlRole]);

  // ── Helm action helpers ────────────────────────────────────────────────────
  function sendWs(msg) {
    const ws = wsRef.current;
    if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
  }

  function onRequestControl() {
    sendWs({ type:'request_control', label:getStoredTweak('label')||'Anonymous' });
  }
  function onReleaseControl()  { sendWs({ type:'release_control' }); }
  function onAcceptHandoff()   { sendWs({ type:'accept_handoff' }); }
  function onDismissRequest()  { sendWs({ type:'dismiss_request' }); }

  function onStop() {
    setThrottle(0);
    setRudder(rudderTrim); // return rudder to trim position
    sendWs({ type:'stop' });
  }

  // ── Data object (d) ───────────────────────────────────────────────────────
  // Built from live telem + local control state.  Passed to every screen
  // component so they all share a single consistent snapshot.
  const d = useMemo(() => {
    const dist = homePos && telem.lat
      ? haversineM(telem.lat, telem.lng, homePos.lat, homePos.lng)
      : 0;
    const brg = homePos && telem.lat
      ? bearingDeg(homePos.lat, homePos.lng, telem.lat, telem.lng)
      : 0;
    return {
      volts: telem.volts, chg: telem.pct, amps: telem.amps, mah: telem.mah,
      sats:  telem.sats,
      spd:   telem.speed / 1.852,   // km/h → knots
      lat:   telem.lat,  lon: telem.lng, alt: telem.alt, hdg: telem.hdg,
      roll:  telem.roll, pitch: telem.pitch,
      lq:    telem.lq,   rssi: telem.rssi,
      temp:  telem.temp, bilgeWet: telem.bilge,
      // Control positions: normalised → display units
      sail: Math.round(sail * 100),       // 0–100 %
      rud:  Math.round(rudder * 100),      // ±100 %
      thr:  Math.round(throttle * 100),   // ±100 %
      trim: rudderTrim,
      homeDist: Math.round(dist),
      homeBrg:  Math.round(brg),
    };
  }, [telem, sail, rudder, throttle, rudderTrim, homePos]);

  // ── Render ────────────────────────────────────────────────────────────────
  const inControl = controlRole === 'controller';

  if (orient === 'landscape') {
    return (
      <>
        <Landscape
          T={T} tab={tab} setTab={setTab} d={d} stale={stale}
          sail={sail} setSail={setSail}
          rudder={rudder} setRudder={setRudder}
          rudderTrim={rudderTrim} setRudderTrim={setRudderTrim}
          throttle={throttle} setThrottle={setThrottle}
          motorMode={motorMode} setMotorMode={setMotorMode}
          homePos={homePos} setHomePos={setHomePos}
          deviceStatus={deviceStatus}
          consoleLines={consoleLines} consoleEnabled={consoleEnabled}
          controlRole={controlRole} controllerLabel={controllerLabel}
          pendingLabel={pendingLabel} pendingExpiresIn={pendingExpiresIn}
          wsRef={wsRef} theme={theme} setTheme={setTheme} setOrient={setOrient}
          onRequestControl={onRequestControl} onReleaseControl={onReleaseControl}
          onAcceptHandoff={onAcceptHandoff} onDismissRequest={onDismissRequest}
          onStop={onStop}
        />
        {settingsOpen && (
          <SettingsModal T={T} tweaks={tweaks} setTweak={setTweak}
            onClose={() => setSettingsOpen(false)}
            onReconnect={() => { wsRef.current?.close(); }}/>
        )}
      </>
    );
  }

  // Portrait layout
  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column',
      background:T.bg, color:T.text, overflowY:'hidden' }}>

      <StatusBar T={T} theme={theme} setTheme={setTheme}
        orient={orient} setOrient={setOrient}
        onSettings={() => setSettingsOpen(true)}/>

      <Masthead T={T} linked={telem.bridge}/>

      <TabBar T={T} tab={tab} setTab={setTab}/>

      {/* Helm banner — only on Control tab */}
      {tab==='control' && (
        <HelmBanner T={T} controlRole={controlRole}
          controllerLabel={controllerLabel}
          pendingLabel={pendingLabel} pendingExpiresIn={pendingExpiresIn}
          onRequest={onRequestControl}
          onAccept={onAcceptHandoff} onDismiss={onDismissRequest}/>
      )}

      {/* Compact telemetry strip — all other tabs */}
      {tab!=='control' && <TelemetryBar T={T} d={d} stale={stale}/>}

      {/* Scrollable content area */}
      <div style={{ flex:1, overflowY:'auto', overflowX:'hidden' }}>
        {tab==='control' && (
          <Ctrl T={T} d={d} stale={stale}
            sail={sail} setSail={setSail}
            rudder={rudder} setRudder={setRudder}
            rudderTrim={rudderTrim} setRudderTrim={setRudderTrim}
            throttle={throttle} setThrottle={setThrottle}
            motorMode={motorMode} setMotorMode={setMotorMode}
            onRelease={onReleaseControl} onStop={onStop}/>
        )}
        {tab==='instr'   && <Instr   T={T} d={d} stale={stale}/>}
        {tab==='map'     && <MapTab  T={T} d={d} stale={stale} homePos={homePos} setHomePos={setHomePos}/>}
        {tab==='devices' && <Dev     T={T} d={d} stale={stale} deviceStatus={deviceStatus}/>}
        {tab==='console' && <Con     T={T} lines={consoleLines} enabled={consoleEnabled}/>}
      </div>

      {/* Settings modal — slides up from the bottom */}
      {settingsOpen && (
        <SettingsModal T={T} tweaks={tweaks} setTweak={setTweak}
          onClose={() => setSettingsOpen(false)}
          onReconnect={() => { wsRef.current?.close(); }}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
