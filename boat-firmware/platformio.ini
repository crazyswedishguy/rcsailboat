[env:esp32-s3]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3

lib_deps =
    adafruit/Adafruit PWM Servo Driver Library @ ^2.4.1
    adafruit/Adafruit INA219 @ ^1.2.3

# GPS variant — enables GPS module on UART2.
# Build with:  pio run -e esp32-s3-gps
# Flash with:  pio run -e esp32-s3-gps --target upload
[env:esp32-s3-gps]
extends  = env:esp32-s3
build_flags =
    ${env:esp32-s3.build_flags}
    -DGPS_ENABLED
lib_deps =
    ${env:esp32-s3.lib_deps}
    mikalhart/TinyGPSPlus @ ^1.0.3

# Compass variant — enables QMC5883L magnetometer for heading on external I2C (IO6/IO7).
# Requires QMC5883L wired to the external bus — see docs/pinmap.md.
# Build with:  pio run -e esp32-s3-compass
[env:esp32-s3-compass]
extends  = env:esp32-s3
build_flags =
    ${env:esp32-s3.build_flags}
    -DCOMPASS_ENABLED
lib_deps =
    ${env:esp32-s3.lib_deps}
    mprograms/QMC5883LCompass @ ^1.1.2

# Full variant — GPS + compass.
# Build with:  pio run -e esp32-s3-full
[env:esp32-s3-full]
extends  = env:esp32-s3
build_flags =
    ${env:esp32-s3.build_flags}
    -DGPS_ENABLED
    -DCOMPASS_ENABLED
lib_deps =
    ${env:esp32-s3.lib_deps}
    mikalhart/TinyGPSPlus @ ^1.0.3
    mprograms/QMC5883LCompass @ ^1.1.2
