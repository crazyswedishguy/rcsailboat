# pioarduino = espressif32 platform with arduino-esp32 3.x (ESP-IDF 5.x).
# Required for quad_mode QSPI display support (SH8601 / CO5300 AMOLED).

# Build artifacts are stored outside Dropbox to prevent file-locking during sync.
[platformio]
build_dir = ${sysenv.LOCALAPPDATA}/pio-build/rcsailboat

[env:esp32-s3]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board     = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

# Waveshare ESP32-S3R8: 16 MB QIO flash, 8 MB OPI PSRAM
# memory_type = qio_opi is the pioarduino 3.x way to configure this;
# psram_type and flash_mode alone are silently ignored.
board_build.flash_size              = 16MB
board_build.arduino.memory_type     = qio_opi
board_build.arduino.partitions      = default_16MB.csv

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE=1
    -I"${PROJECT_INCLUDE_DIR}"

lib_deps =
    adafruit/Adafruit PWM Servo Driver Library @ ^2.4.1
    adafruit/Adafruit INA219 @ ^1.2.3
    lvgl/lvgl @ 8.3.11

# GPS variant — enables GPS module on UART2.
[env:esp32-s3-gps]
extends  = env:esp32-s3
build_flags =
    ${env:esp32-s3.build_flags}
    -DGPS_ENABLED
lib_deps =
    ${env:esp32-s3.lib_deps}
    mikalhart/TinyGPSPlus @ ^1.0.3

# Compass variant — QMC5883L on external I2C.
[env:esp32-s3-compass]
extends  = env:esp32-s3
build_flags =
    ${env:esp32-s3.build_flags}
    -DCOMPASS_ENABLED
lib_deps =
    ${env:esp32-s3.lib_deps}
    mprograms/QMC5883LCompass @ ^1.1.2

# Full variant — GPS + compass.
[env:esp32-s3-full]
extends  = env:esp32-s3
build_flags =
    ${env:esp32-s3.build_flags}
    -DGPS_ENABLED
    -DCOMPASS_ENABLED
lib_deps =
    ${env:esp32-s3.lib_deps}
    mikalhart/TinyGPSPlus @ ^1.0.3
    mprograms/QMC5883LCompass @ ^1.1.2
