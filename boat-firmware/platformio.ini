# pioarduino = espressif32 platform with arduino-esp32 3.x (ESP-IDF 5.x).
# Required for quad_mode QSPI display support (SH8601 AMOLED).
[env:esp32-s3]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board     = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

# Waveshare board: 8 MB flash, OPI PSRAM, USB-CDC on boot
board_build.flash_size          = 8MB
board_build.flash_mode          = dio
board_build.psram_type          = opi
board_build.arduino.partitions  = default_8MB.csv

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM

lib_deps =
    adafruit/Adafruit PWM Servo Driver Library @ ^2.4.1
    adafruit/Adafruit INA219 @ ^1.2.3

# GPS variant — enables GPS module on UART2.
[env:esp32-s3-gps]
extends  = env:esp32-s3
build_flags =
    ${env:esp32-s3.build_flags}
    -DGPS_ENABLED
lib_deps =
    ${env:esp32-s3.lib_deps}
    mikalhart/TinyGPSPlus @ ^1.0.3

# Compass variant — QMC5883L on external I2C (IO6/IO7).
[env:esp32-s3-compass]
extends  = env:esp32-s3
build_flags =
    ${env:esp32-s3.build_flags}
    -DCOMPASS_ENABLED
lib_deps =
    ${env:esp32-s3.lib_deps}
    mprograms/QMC5883LCompass @ ^1.1.2

# Full variant — GPS + compass.
[env:esp32-s3-full]
extends  = env:esp32-s3
build_flags =
    ${env:esp32-s3.build_flags}
    -DGPS_ENABLED
    -DCOMPASS_ENABLED
lib_deps =
    ${env:esp32-s3.lib_deps}
    mikalhart/TinyGPSPlus @ ^1.0.3
    mprograms/QMC5883LCompass @ ^1.1.2
