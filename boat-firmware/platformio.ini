# pioarduino = espressif32 platform with arduino-esp32 3.x (ESP-IDF 5.x).
# Required for quad_mode QSPI display support (SH8601 / CO5300 AMOLED).

# Build artifacts are stored outside Dropbox to prevent file-locking during sync.
[platformio]
build_dir = ${sysenv.HOME}/.cache/pio-build/rcsailboat

[env:esp32-s3]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board     = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

# Waveshare ESP32-S3R8: 8 MB QIO flash (GigaDevice GD25Q64, 0xC8/0x4017), 8 MB OPI PSRAM.
# Note: board docs say 16 MB; actual chip esptool-detected as 8 MB (GigaDevice 0x4017).
# memory_type = qio_opi is the pioarduino 3.x way to select the right prebuilt libs.
# upload.flash_mode must be DIO — QIO crashes the ROM loader on cold boot for this board.
board_build.flash_size              = 8MB
board_build.arduino.memory_type     = qio_opi
board_build.arduino.partitions      = default_8MB.csv
board_upload.flash_mode             = dio
board_upload.flash_size             = 8MB

# Exclude the elrs_test standalone firmware from all normal builds.
# elrs_test.cpp has its own setup()/loop() — it is only built by the elrs-only env.
build_src_filter = +<*> -<elrs_test.cpp>

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE=1
    -I"${PROJECT_INCLUDE_DIR}"
    -I"${PROJECT_DIR}/../shared"

lib_deps =
    adafruit/Adafruit PWM Servo Driver Library @ ^2.4.1
    robtillaart/INA228 @ ^0.4.1
    lvgl/lvgl @ 8.3.11
    alfredosystems/AlfredoCRSF @ ^1.0.1

# GPS variant — enables GPS module on UART2.
[env:esp32-s3-gps]
extends  = env:esp32-s3
build_flags =
    ${env:esp32-s3.build_flags}
    -DGPS_ENABLED
lib_deps =
    ${env:esp32-s3.lib_deps}
    mikalhart/TinyGPSPlus @ ^1.0.3

# Compass variant — HMC5883L on external I2C (BN-880 module).
[env:esp32-s3-compass]
extends  = env:esp32-s3
build_flags =
    ${env:esp32-s3.build_flags}
    -DCOMPASS_ENABLED
lib_deps =
    ${env:esp32-s3.lib_deps}
    adafruit/Adafruit HMC5883 Unified @ ^1.2.3
    adafruit/Adafruit Unified Sensor @ ^1.1.14

# Full variant — GPS + compass.
[env:esp32-s3-full]
extends  = env:esp32-s3
build_flags =
    ${env:esp32-s3.build_flags}
    -DGPS_ENABLED
    -DCOMPASS_ENABLED
lib_deps =
    ${env:esp32-s3.lib_deps}
    mikalhart/TinyGPSPlus @ ^1.0.3
    adafruit/Adafruit HMC5883 Unified @ ^1.2.3
    adafruit/Adafruit Unified Sensor @ ^1.1.14

# Minimal ELRS-only test firmware for end-to-end channel path debugging.
# No WiFi, display, I2C, GPS, compass, or servos — pure CRSF receive + USB-CDC print.
# Pair with crsf-bridge command interface (Mode 2) and tools/elrs-console.py.
[env:esp32-s3-elrs-only]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board     = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed  = 921600
board_build.flash_size              = 8MB
board_build.arduino.memory_type     = qio_opi
board_build.arduino.partitions      = default_8MB.csv
board_upload.flash_mode             = dio
board_upload.flash_size             = 8MB
build_src_filter = -<*> +<elrs_test.cpp>
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=1
lib_deps =
    alfredosystems/AlfredoCRSF @ ^1.0.1

# ELRS bench-test variant — boots directly into ELRS mode, skipping WiFi AP startup.
# Use this when the ELRS receiver is wired and you want to test the radio link
# without needing the touchscreen to switch modes.
[env:esp32-s3-elrs-test]
extends   = env:esp32-s3
build_flags =
    ${env:esp32-s3.build_flags}
    -DFORCE_ELRS_MODE

# Full bench-test variant — GPS + compass + forced ELRS mode.
# Use for end-to-end RF testing: XIAO controls work immediately, compass heading
# flows in ATTITUDE telemetry, GPS track available.
[env:esp32-s3-full-elrs-test]
extends  = env:esp32-s3-full
build_flags =
    ${env:esp32-s3-full.build_flags}
    -DFORCE_ELRS_MODE
