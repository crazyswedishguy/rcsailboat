# Transparent USB-CDC <-> UART CRSF bridge for a Seeed XIAO ESP32-S3.
#
# Sits between the Pi (USB) and the ELRS Ranger Micro TX module (hardware UART).
# Exists only because the Pi 5's RP1 GPIO UART can't reliably do CRSF — see
# docs/elrs-link.md. Keep this firmware dumb: all CRSF framing/parsing logic
# stays on the Pi side; this just shuttles bytes.

[platformio]
build_dir = ${sysenv.HOME}/.cache/pio-build/crsf-bridge

[env:xiao-esp32s3]
platform  = espressif32
board     = seeed_xiao_esp32s3
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
